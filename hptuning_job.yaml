studySpec:
  metrics:
  - metricId: dev_ppl
    goal: MINIMIZE
  parameters:
  - parameterId: lr
    doubleValueSpec:
      minValue: 0.0001
      maxValue: 0.001
    scaleType: UNIT_LOG_SCALE
  - parameterId: dropout
    doubleValueSpec:
      minValue: 0.1
      maxValue: 0.5
    scaleType: UNIT_LINEAR_SCALE
  algorithm: RANDOM_SEARCH
maxTrialCount: 8
parallelTrialCount: 2
trialJobSpec:
  workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-8
      acceleratorType: NVIDIA_TESLA_V100
      acceleratorCount: 1
    replicaCount: 1
    pythonPackageSpec:
      executorImageUri: us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-4.py310:latest
      packageUris:
      - gs://japanese_english_nmt/packages/trainer-0.1.tar.gz
      pythonModule: run
      args:
      - train
      - --train-src=/tmp/data/train.ja
      - --train-tgt=/tmp/data/train.en
      - --dev-src=/tmp/data/dev.ja
      - --dev-tgt=/tmp/data/dev.en
      - --vocab=vocab_50k.json
      - --vocab-size-src=50000
      - --src-vocab-model=src_50k
      - --gpu
      - --batch-size=32
      - --valid-niter=200
      - --patience=1
      - --hyper-tune=y
